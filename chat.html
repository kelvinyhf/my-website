<!DOCTYPE html>
<html lang="en">
<head>
  
  <!-- Theme Detection -->
  <script>
  const savedTheme = localStorage.getItem('theme');
  const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
    document.documentElement.classList.add('dark');
  } else {
    document.documentElement.classList.remove('dark');
  }
  </script>
  
  <!-- Basic Meta Tags -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  
  <!-- SEO Meta Tags -->
  <title>Chat With Me</title>
  <meta name="description" content="FILL">
  <meta name="author" content="KelvinY">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://kelviny.pages.dev/chat.html">
  
  <!-- Open Graph -->
  <meta property="og:title" content="Chat With Me">
  <meta property="og:description" content="FILL">
  <meta property="og:image" content="IMAGE">
  <meta property="og:url" content="https://kelviny.pages.dev/chat.html">
  <meta property="og:type" content="website">

  <!-- iOS Optimization -->
  <meta name="theme-color" content="COLOR">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">

  <!-- External Files -->
  <link rel="icon" type="image/png" sizes="32x32" href="PATH">
  <link rel="apple-touch-icon" href="PATH">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap">
  
  <!-- Libraries -->
  <link rel="stylesheet" href="assets/libraries/radix-colors.css">
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/chat.css">
  
</head>
<body ontouchstart="">
  
  <main>
    <!-- Chat Header -->
    <header class="chat-header">
      <div class="chat-avatar-container">
        <img class="lg-1" src="assets/images/kelviny-avatar.png" width="40" height="40" alt="KelvinY's Avatar">
      </div>
      <div class="chat-name">
        <h1>KelvinY</h1>
        <span>Online</span>
      </div>
      <a class="return-btn" aria-label="Return to home page." href="/index.html">
        <svg class="md-1" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--gray-11)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </a>
    </header>
    
    <!-- Chat Messages -->
    <div id="chatMessages" class="chat-messages">
      <div class="message kelvin">
        <p>
          Hi! I'm the digital version of Kelvin.
          Feel free to ask me anything about coding or just chat with me.
        </p>
      </div>
    </div>
    
    <!-- Chat Input -->
    <div class="chat-input">
      <textarea id="userInput" class="user-input" placeholder="Ask me anything..."></textarea>
      <button id="sendBtn" class="send-btn">
        <svg class="sm-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--green-1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
      </button>
    </div>
    
  </main>
  
  <!-- JavaScript -->
  <script src="assets/libraries/tsparticles.bundle.min.js"></script>
  <script src="js/global.js"></script>
  <script src="js/chat.js"></script>
  
</body>
</html>
